services:

  auth-api:
    build:
      context: ./auth-api
      dockerfile: Dockerfile
    container_name: chat-auth-api
    ports:
      - "8000:8000"
    environment:
      - PEPPER=${PEPPER}
      - JWT_SECRET=${JWT_SECRET}
      - AES=${AES}
    volumes:
      - ./auth-api/data:/app/data
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - API_URL=http://auth-api:8000
    restart: unless-stopped
    networks:
      - chat-network
    depends_on:
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:

networks:
  chat-network:
    driver: bridge
